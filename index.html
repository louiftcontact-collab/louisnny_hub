<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Louisnny</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,200;0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --c1: #0a0a0f;
  --c2: #12121a;
  --glass: rgba(255,255,255,0.04);
  --glass-border: rgba(255,255,255,0.08);
  --glass-hover: rgba(255,255,255,0.08);
  --white: #f0eee8;
  --muted: rgba(240,238,232,0.45);
  --accent: #7DF9FF;
  --accent2: #FF6BF8;
  --accent3: #FFE45E;
}

html, body {
  min-height: 100%;
  background: var(--c1);
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

.aurora {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
}
.aurora-blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  mix-blend-mode: screen;
  opacity: 0;
  animation: aurora-fade 1.2s ease forwards;
}
.a1 {
  width: 60vw; height: 60vw;
  top: -20%; left: -10%;
  background: radial-gradient(circle, #6C3BFF 0%, transparent 70%);
  opacity: 0;
  animation: aurora-fade 1.2s ease 0.1s forwards, drift1 18s ease-in-out 1.3s infinite alternate;
}
.a2 {
  width: 50vw; height: 50vw;
  bottom: -15%; right: -10%;
  background: radial-gradient(circle, #FF3BDA 0%, transparent 70%);
  opacity: 0;
  animation: aurora-fade 1.2s ease 0.3s forwards, drift2 22s ease-in-out 1.5s infinite alternate;
}
.a3 {
  width: 40vw; height: 40vw;
  top: 30%; left: 40%;
  background: radial-gradient(circle, #00D4FF 0%, transparent 70%);
  opacity: 0;
  animation: aurora-fade 1.2s ease 0.5s forwards, drift3 15s ease-in-out 1.7s infinite alternate;
}
@keyframes aurora-fade { to { opacity: 0.18; } }
@keyframes drift1 { from { transform: translate(0,0) scale(1); } to { transform: translate(5vw, 8vh) scale(1.1); } }
@keyframes drift2 { from { transform: translate(0,0) scale(1); } to { transform: translate(-8vw, -5vh) scale(1.15); } }
@keyframes drift3 { from { transform: translate(0,0) scale(1); } to { transform: translate(-4vw, 6vh) scale(0.9); } }

.aurora::after {
  content: '';
  position: absolute; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity: 0.025;
  pointer-events: none;
}

.page {
  position: relative;
  z-index: 10;
  min-height: 100svh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem 1.2rem 3rem;
}

.container {
  width: 100%;
  max-width: 400px;
  display: flex;
  flex-direction: column;
  gap: 0;
}

.header {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2.5rem 2rem 2rem;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-bottom: none;
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-radius: 24px 24px 0 0;
  position: relative;
  overflow: hidden;
  opacity: 0;
  transform: translateY(20px);
  animation: pop-in 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.4s forwards;
}

.header::before {
  content: '';
  position: absolute;
  top: 0; left: 10%; right: 10%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
  opacity: 0.6;
}

@keyframes pop-in {
  to { opacity: 1; transform: translateY(0); }
}

.avatar-wrap {
  position: relative;
  margin-bottom: 1.4rem;
}
.avatar-ring-outer {
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  padding: 2px;
  background: conic-gradient(var(--accent), var(--accent2), var(--accent3), var(--accent));
  animation: spin-ring 4s linear infinite;
}
.avatar-ring-outer::before {
  content: '';
  position: absolute;
  inset: 2px;
  border-radius: 50%;
  background: var(--c1);
}
@keyframes spin-ring { to { transform: rotate(360deg); } }

.avatar {
  position: relative;
  width: 88px; height: 88px;
  border-radius: 50%;
  overflow: hidden;
  background: var(--c2);
  display: flex; align-items: center; justify-content: center;
  z-index: 1;
}
.avatar img { width: 100%; height: 100%; object-fit: cover; }
.avatar .fallback {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.8rem;
  letter-spacing: 0.05em;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 3.6rem;
  letter-spacing: 0.08em;
  line-height: 1;
  background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.7) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-align: center;
}

.badge-row {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-top: 0.6rem;
}
.badge {
  font-size: 0.6rem;
  font-weight: 400;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 100px;
  border: 1px solid;
}
.badge-cyan { border-color: var(--accent); color: var(--accent); }
.badge-pink { border-color: var(--accent2); color: var(--accent2); }

.links-block {
  display: flex;
  flex-direction: column;
  background: var(--glass);
  border-left: 1px solid var(--glass-border);
  border-right: 1px solid var(--glass-border);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  opacity: 0;
  transform: translateY(20px);
  animation: pop-in 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.6s forwards;
}

.link-item {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 1.15rem 1.5rem;
  text-decoration: none;
  color: var(--white);
  border-bottom: 1px solid var(--glass-border);
  position: relative;
  overflow: hidden;
  transition: background 0.25s;
  cursor: pointer;
  opacity: 0;
  animation: pop-in 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
}
.link-item:nth-child(1) { animation-delay: 0.75s; }
.link-item:nth-child(2) { animation-delay: 0.88s; }
.link-item:nth-child(3) { animation-delay: 1.01s; }
.link-item:nth-child(4) { animation-delay: 1.14s; }

.link-item:hover { background: var(--glass-hover); }

.link-item::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.04) 50%, transparent 100%);
  transform: translateX(-100%);
  transition: transform 0.5s ease;
}
.link-item:hover::after { transform: translateX(100%); }

.link-icon-box {
  width: 40px; height: 40px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  border: 1px solid rgba(255,255,255,0.1);
  transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
.link-item:hover .link-icon-box { transform: scale(1.1) rotate(-4deg); }
.link-icon-box svg {
  width: 18px; height: 18px;
  stroke-width: 1.5;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.ib-tiktok { background: rgba(255,107,248,0.12); color: #FF6BF8; border-color: rgba(255,107,248,0.2); }
.ib-insta  { background: rgba(255,138,76,0.12);  color: #FF8A4C; border-color: rgba(255,138,76,0.2); }
.ib-pro    { background: rgba(125,249,255,0.12); color: #7DF9FF; border-color: rgba(125,249,255,0.2); }
.ib-watch  { background: rgba(255,228,94,0.12);  color: #FFE45E; border-color: rgba(255,228,94,0.2); }

.link-text { flex: 1; }
.link-label {
  font-size: 0.82rem;
  font-weight: 400;
  letter-spacing: 0.06em;
  display: block;
}
.link-sub {
  font-size: 0.72rem;
  color: var(--muted);
  display: block;
  margin-top: 1px;
  font-style: italic;
}

.link-chevron {
  opacity: 0.25;
  transition: opacity 0.2s, transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
.link-chevron svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.link-item:hover .link-chevron { opacity: 0.8; transform: translateX(4px); }

.link-item.pro-item {
  position: relative;
}
.link-item.pro-item::before {
  content: '';
  position: absolute;
  top: 0; left: 10%; right: 10%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0.4;
}

.link-item.watch-item::before {
  content: '';
  position: absolute;
  top: 0; left: 10%; right: 10%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent3), transparent);
  opacity: 0.4;
}

.footer-block {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-top: none;
  border-radius: 0 0 24px 24px;
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  padding: 1rem 1.5rem 1.4rem;
  opacity: 0;
  transform: translateY(20px);
  animation: pop-in 0.7s cubic-bezier(0.34,1.56,0.64,1) 1.25s forwards;
}

.discord-row {
  display: flex;
  align-items: center;
  gap: 0.9rem;
  padding: 0.9rem 1rem;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.06);
  background: rgba(0,0,0,0.2);
  margin-bottom: 1rem;
}
.discord-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent3);
  flex-shrink: 0;
  box-shadow: 0 0 10px var(--accent3);
  animation: blink 2s ease infinite;
}
@keyframes blink { 0%,100%{ opacity:1; } 50%{ opacity:0.3; } }
.discord-label {
  font-size: 0.72rem;
  font-weight: 400;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--white);
  flex: 1;
}
.discord-sub {
  font-size: 0.68rem;
  color: var(--muted);
  font-style: italic;
  display: block;
  margin-top: 1px;
}
.discord-tag {
  font-size: 0.58rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent3);
  border: 1px solid rgba(255,228,94,0.3);
  border-radius: 100px;
  padding: 2px 8px;
  flex-shrink: 0;
  background: rgba(255,228,94,0.06);
}

.copy {
  text-align: center;
  font-size: 0.58rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: rgba(240,238,232,0.2);
}

.orb {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 2;
  opacity: 0;
  animation: orb-in 2s ease forwards;
}
@keyframes orb-in { to { opacity: 1; } }
.orb1 { width: 3px; height: 3px; background: var(--accent); top: 20%; left: 15%; box-shadow: 0 0 8px var(--accent); animation-delay: 1.5s; }
.orb2 { width: 2px; height: 2px; background: var(--accent2); top: 60%; right: 18%; box-shadow: 0 0 6px var(--accent2); animation-delay: 1.8s; }
.orb3 { width: 3px; height: 3px; background: var(--accent3); bottom: 25%; left: 22%; box-shadow: 0 0 8px var(--accent3); animation-delay: 2s; }
</style>
</head>
<body>

<div class="aurora">
  <div class="aurora-blob a1"></div>
  <div class="aurora-blob a2"></div>
  <div class="aurora-blob a3"></div>
</div>

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<main class="page">
  <div class="container">

    <div class="header">
      <div class="avatar-wrap">
        <div class="avatar-ring-outer"></div>
        <div class="avatar">
          <img src="pp.jpg" alt="Louisnny"
            onerror="this.style.display='none';this.nextElementSibling.style.cssText='display:flex;width:100%;height:100%;align-items:center;justify-content:center;';">
          <div class="fallback" style="display:none;">L</div>
        </div>
      </div>
      <div class="name">Louisnny</div>
      <div class="badge-row">
        <span class="badge badge-cyan">Horlogerie</span>
        <span class="badge badge-pink">Contenu</span>
      </div>
    </div>

    <div class="links-block">
      <a href="https://www.tiktok.com/@louisnny" target="_blank" rel="noopener" class="link-item">
        <div class="link-icon-box ib-tiktok">
          <svg viewBox="0 0 24 24" fill="currentColor" stroke="none">
            <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V9.41a8.16 8.16 0 0 0 4.77 1.52V7.48a4.85 4.85 0 0 1-1-.79z"/>
          </svg>
        </div>
        <div class="link-text">
          <span class="link-label">TikTok</span>
          <span class="link-sub">@louisnny</span>
        </div>
        <div class="link-chevron"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
      </a>

      <a href="https://www.instagram.com/louisnny.watches" target="_blank" rel="noopener" class="link-item">
        <div class="link-icon-box ib-insta">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <rect x="2" y="2" width="20" height="20" rx="5"/>
            <circle cx="12" cy="12" r="4"/>
            <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/>
          </svg>
        </div>
        <div class="link-text">
          <span class="link-label">Instagram</span>
          <span class="link-sub">@louisnny.watches</span>
        </div>
        <div class="link-chevron"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
      </a>

      <a href="recherche-montre.html" class="link-item watch-item">
        <div class="link-icon-box ib-watch">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <circle cx="12" cy="12" r="7"/>
            <polyline points="12 9 12 12 13.5 13.5"/>
            <path d="M9 3.5h6M9 20.5h6"/>
          </svg>
        </div>
        <div class="link-text">
          <span class="link-label">Recherche de Montre</span>
          <span class="link-sub">Trouvez la pièce rare via mon réseau</span>
        </div>
        <div class="link-chevron"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
      </a>

      <a href="contact.html" class="link-item pro-item">
        <div class="link-icon-box ib-pro">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <rect x="2" y="7" width="20" height="14" rx="2"/>
            <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
            <line x1="12" y1="12" x2="12" y2="12.01"/>
            <path d="M8 12h.01M16 12h.01"/>
            <path d="M12 16v-4"/>
          </svg>
        </div>
        <div class="link-text">
          <span class="link-label">Contact Professionnel</span>
          <span class="link-sub">Partenariats &amp; collaborations</span>
        </div>
        <div class="link-chevron"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
      </a>
    </div>

    <div class="footer-block">
      <div class="discord-row">
        <div class="discord-dot"></div>
        <div style="flex:1">
          <div class="discord-label">Discord</div>
          <div class="discord-sub">Ouverture prochaine</div>
        </div>
        <div class="discord-tag">Bient&#244;t</div>
      </div>
      <div class="copy">&copy; 2026 Louisnny &mdash; All rights reserved</div>
    </div>

  </div>
</main>

<script>
  const blobs = document.querySelectorAll('.aurora-blob');
  document.addEventListener('mousemove', e => {
    const tx = (e.clientX / window.innerWidth - 0.5) * 30;
    const ty = (e.clientY / window.innerHeight - 0.5) * 30;
    blobs.forEach((b, i) => {
      const f = [1, -1.2, 0.8][i];
      b.style.transform = `translate(${tx*f}px, ${ty*f}px)`;
    });
  });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Louisnny_hub</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel pour comprendre le JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { margin: 0; background-color: black; overflow-x: hidden; }
        .perspective-1000 { perspective: 1000px; }
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin-slow 8s linear infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Icônes (SVG Inline pour éviter les dépendances externes) ---
        const Sparkles = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L12 3Z"/></svg>
        );
        const Music = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        );
        const Instagram = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>
        );
        const Youtube = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2.5 17a24.12 24.12 0 0 1 0-10 2 2 0 0 1 1.4-1.4 49.56 49.56 0 0 1 16.2 0A2 2 0 0 1 21.5 7a24.12 24.12 0 0 1 0 10 2 2 0 0 1-1.4 1.4 49.55 49.55 0 0 1-16.2 0A2 2 0 0 1 2.5 17"/><path d="m10 15 5-3-5-3z"/></svg>
        );
        const ExternalLink = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        );
        const Construction = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="2" y="6" width="20" height="8" rx="1"/><path d="M17 14v7"/><path d="M7 14v7"/><path d="M17 3v3"/><path d="M7 3v3"/><path d="M10 14 2.3 6.3"/><path d="m14 6 7.7 7.7"/><path d="m8 6 8 8"/></svg>
        );
        const Gamepad2 = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="6" x2="10" y1="11" y2="11"/><line x1="8" x2="8" y1="9" y2="13"/><line x1="15" x2="15.01" y1="12" y2="12"/><line x1="18" x2="18.01" y1="10" y2="10"/><path d="M17.32 5H6.68a4 4 0 0 0-3.978 3.59c-.006.052-.01.101-.017.152C2.604 9.416 2 14.456 2 16a3 3 0 0 0 3 3c1 0 1.5-.5 2-1l1.414-1.414A2 2 0 0 1 9.828 16h4.344a2 2 0 0 1 1.414.586L17 18c.5.5 1 1 2 1a3 3 0 0 0 3-3c0-1.545-.604-6.584-.685-7.258-.007-.05-.011-.1-.017-.151A4 4 0 0 0 17.32 5z"/></svg>
        );

        // --- Composant Lien Social ---
        const SocialLink = ({ href, icon, label, sublabel, color }) => {
            return (
                <a 
                href={href}
                target="_blank"
                rel="noopener noreferrer"
                className={`
                    group relative flex items-center gap-4 p-4 rounded-xl 
                    bg-white/5 border border-white/5 transition-all duration-300 
                    hover:scale-105 hover:-translate-y-1 cursor-pointer
                    ${color}
                `}
                >
                <div className="text-white group-hover:scale-110 transition-transform duration-300">
                    {icon}
                </div>
                <div className="flex-1">
                    <h3 className="font-semibold text-white tracking-wide">{label}</h3>
                    <p className="text-xs text-white/50 group-hover:text-white/80 transition-colors">
                    {sublabel}
                    </p>
                </div>
                <ExternalLink className="w-4 h-4 text-white/30 group-hover:text-white transition-colors opacity-0 group-hover:opacity-100" />
                </a>
            );
        };

        // --- Composant Principal ---
        const SocialHub = () => {
            const [mousePos, setMousePos] = useState({ x: 0, y: 0 });
            const containerRef = useRef(null);

            useEffect(() => {
                const handleMouseMove = (e) => {
                    const x = (e.clientX / window.innerWidth) * 2 - 1;
                    const y = (e.clientY / window.innerHeight) * 2 - 1;
                    setMousePos({ x, y });
                };

                window.addEventListener('mousemove', handleMouseMove);
                return () => window.removeEventListener('mousemove', handleMouseMove);
            }, []);

            const rotateX = mousePos.y * -10;
            const rotateY = mousePos.x * 10;

            return (
                <div className="relative min-h-screen w-full overflow-hidden bg-black text-white selection:bg-pink-500 selection:text-white font-sans">
                
                {/* --- Arrière-plan animé --- */}
                <div className="absolute inset-0 z-0 pointer-events-none">
                    <div 
                    className="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] bg-purple-600 rounded-full mix-blend-screen filter blur-[100px] opacity-40 animate-pulse"
                    style={{ transform: `translate(${mousePos.x * -20}px, ${mousePos.y * -20}px)` }}
                    />
                    <div 
                    className="absolute bottom-[-10%] right-[-10%] w-[50vw] h-[50vw] bg-blue-600 rounded-full mix-blend-screen filter blur-[100px] opacity-40 animate-pulse delay-1000"
                    style={{ transform: `translate(${mousePos.x * -30}px, ${mousePos.y * -30}px)` }}
                    />
                    <div 
                    className="absolute top-[40%] left-[30%] w-[30vw] h-[30vw] bg-pink-600 rounded-full mix-blend-screen filter blur-[120px] opacity-30"
                    style={{ transform: `translate(${mousePos.x * 40}px, ${mousePos.y * 40}px)` }}
                    />
                    <div className="absolute inset-0 bg-[url('https://grainy-gradients.vercel.app/noise.svg')] opacity-20"></div>
                </div>

                {/* --- Conteneur Principal --- */}
                <div 
                    className="relative z-10 flex items-center justify-center min-h-screen px-4 perspective-1000"
                    style={{ perspective: '1000px' }}
                >
                    <div 
                    ref={containerRef}
                    className="w-full max-w-md p-8 transition-transform duration-100 ease-out transform bg-white/5 border border-white/10 backdrop-blur-xl rounded-3xl shadow-2xl"
                    style={{
                        transform: `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.02)`,
                        boxShadow: `
                        ${-rotateY * 2}px ${rotateX * 2}px 30px rgba(0,0,0,0.5), 
                        0 0 20px rgba(168, 85, 247, 0.2)
                        `
                    }}
                    >
                    {/* En-tête Profil */}
                    <div className="flex flex-col items-center mb-8">
                        <div className="relative group cursor-pointer">
                        <div className="absolute -inset-1 bg-gradient-to-r from-pink-600 to-purple-600 rounded-full blur opacity-75 group-hover:opacity-100 transition duration-1000 group-hover:duration-200"></div>
                        <div className="relative w-24 h-24 rounded-full bg-gray-900 flex items-center justify-center border-2 border-white/20 overflow-hidden">
                             {/* IMAGE DE PROFIL - Assure-toi que pp.jpg est dans le même dossier */}
                             <img 
                                src="pp.jpg" 
                                alt="Profile"
                                onError={(e) => {
                                    e.target.onerror = null;
                                    e.target.style.display = 'none';
                                    e.target.parentElement.innerHTML = '<svg class="w-10 h-10 text-white animate-spin-slow" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L12 3Z"/></svg>'; 
                                }}
                                className="w-full h-full object-cover hover:scale-110 transition-transform duration-500"
                            />
                        </div>
                        </div>
                        <h1 className="mt-4 text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-300 via-purple-300 to-indigo-300">
                        Louisnny
                        </h1>
                        <p className="text-white/60 text-sm mt-2 font-light tracking-widest uppercase">
                        Horlogerie
                        </p>
                    </div>

                    {/* Liens Réseaux */}
                    <div className="space-y-4">
                        <SocialLink 
                        href="https://www.tiktok.com/@louisnny" 
                        icon={<Music className="w-6 h-6" />} 
                        label="TikTok" 
                        sublabel="@louisnny"
                        color="hover:bg-pink-500/20 hover:border-pink-500/50 hover:shadow-[0_0_20px_rgba(236,72,153,0.4)]"
                        />
                        
                        <SocialLink 
                        href="https://www.instagram.com/louisnny.watches" 
                        icon={<Instagram className="w-6 h-6" />} 
                        label="Instagram" 
                        sublabel="@louisnny.watches"
                        color="hover:bg-orange-500/20 hover:border-orange-500/50 hover:shadow-[0_0_20px_rgba(249,115,22,0.4)]"
                        />
                        
                        <SocialLink 
                        href="https://www.youtube.com/@Louisnny" 
                        icon={<Youtube className="w-6 h-6" />} 
                        label="YouTube" 
                        sublabel="@Louisnny"
                        color="hover:bg-red-600/20 hover:border-red-600/50 hover:shadow-[0_0_20px_rgba(220,38,38,0.4)]"
                        />
                    </div>

                    {/* Section Discord */}
                    <div className="mt-8 relative group">
                        <div className="absolute -inset-0.5 bg-gradient-to-r from-yellow-600 to-yellow-400 rounded-xl blur opacity-20 group-hover:opacity-40 transition duration-500"></div>
                        <div className="relative p-4 bg-black/40 border border-yellow-500/30 rounded-xl flex items-center gap-4 backdrop-blur-md overflow-hidden">
                        
                        <div className="absolute inset-0 opacity-5" 
                            style={{backgroundImage: 'repeating-linear-gradient(45deg, transparent, transparent 10px, #EAB308 10px, #EAB308 20px)'}}>
                        </div>

                        <div className="bg-yellow-500/20 p-2 rounded-lg text-yellow-400 animate-pulse">
                            <Construction className="w-6 h-6" />
                        </div>
                        
                        <div className="flex-1">
                            <h3 className="text-yellow-200 font-bold text-sm tracking-wide flex items-center gap-2">
                            SERVEUR DISCORD
                            <span className="flex h-2 w-2 relative">
                                <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-yellow-400 opacity-75"></span>
                                <span className="relative inline-flex rounded-full h-2 w-2 bg-yellow-500"></span>
                            </span>
                            </h3>
                            <p className="text-yellow-100/60 text-xs mt-1">Zone en construction. Ouverture prochaine.</p>
                        </div>

                        <Gamepad2 className="w-12 h-12 text-white/5 absolute -right-2 -bottom-2 rotate-12" />
                        </div>
                    </div>
                    
                    {/* Footer */}
                    <div className="mt-8 text-center">
                        <p className="text-[10px] text-white/30 uppercase tracking-[0.2em]">
                        © 2026 Louisnny Corp
                        </p>
                    </div>

                    </div>
                </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SocialHub />);
    </script>
</body>
</html>
